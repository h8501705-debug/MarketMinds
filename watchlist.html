<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - MarketMinds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            color: #e5e7eb;
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.15);
            top: -250px;
            right: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(16, 185, 129, 0.1);
            bottom: -200px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        .navbar {
            background: rgba(10, 11, 14, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #e5e7eb;
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-link.active {
            color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .back-btn {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1 !important;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .watchlist-header {
            background: rgba(26, 28, 35, 0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .watchlist-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .watchlist-title h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stock-count {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
        }

        .watchlist-meta {
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .search-box {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(26, 28, 35, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            color: #e5e7eb;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-box input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .search-box .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .stocks-container {
            background: rgba(26, 28, 35, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .stock-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px;
            padding: 1rem 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            font-weight: 600;
            color: #9ca3af;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .stock-item {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .stock-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .stock-item:last-child {
            border-bottom: none;
        }

        .stock-number {
            color: #9ca3af;
        }

        .stock-symbol {
            font-weight: 600;
            color: #e5e7eb;
        }

        .stock-price {
            color: #10b981;
        }

        .stock-change {
            color: #ef4444;
        }

        .stock-change.positive {
            color: #10b981;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: rgba(26, 28, 35, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #e5e7eb;
        }

        .page-btn.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #9ca3af;
        }

        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            color: #9ca3af;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">MarketMinds</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="dashboard.html" class="nav-link back-btn">← Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="watchlist-header">
            <div class="watchlist-title">
                <h1 id="watchlistName">Loading...</h1>
                <span id="stockCount" class="stock-count">0 stocks</span>
            </div>
            <div id="watchlistMeta" class="watchlist-meta"></div>
        </div>

        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search stocks in this watchlist...">
        </div>

        <div class="stocks-container">
            <div class="stock-header">
                <div>#</div>
                <div>Symbol</div>
                <div>Price</div>
                <div>Change</div>
            </div>
            <div id="stocksList"></div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <footer class="footer">
        <p>© 2024 MarketMinds. Click any stock to view chart.</p>
    </footer>

    <script src="watchlist.js"></script>
</body>
</html>
